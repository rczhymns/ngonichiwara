// ── Storage ────────────────────────────────────────────────────────────────
function loadKey(key) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveKey(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch { alert("Storage full — try removing an image."); }
}

// ── Export / Import ────────────────────────────────────────────────────────
function exportData(posts, books, about) {
  const data = { version: 1, exportedAt: new Date().toISOString(), posts, books, about };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ngoni-site-backup.json"; a.click();
  URL.revokeObjectURL(url);
}

function importData(file, onDone) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.posts || !data.books) { alert("Invalid backup file."); return; }
      onDone(data.posts, data.books, data.about || DEFAULT_ABOUT);
    } catch { alert("Could not read file — make sure it's a valid backup."); }
  };
  reader.readAsText(file);
}

// ── Image compression ──────────────────────────────────────────────────────
async function compress(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = 1000;
        const r = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * r); c.height = Math.round(img.height * r);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL("image/jpeg", 0.76));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function PdfModal({ book, onClose }) {
  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(25,24,15,0.88)", zIndex: 1000, display: "flex", flexDirection: "column" }}>
      {/* toolbar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1rem 2rem", borderBottom: `0.5px solid rgba(255,255,255,0.12)`, flexShrink: 0 }}>
        <span style={{ fontFamily: serif, fontSize: "1rem", fontWeight: 300, color: "rgba(249,248,243,0.7)", fontStyle: "italic" }}>{book.title}</span>
        <button onClick={onClose} style={{ fontFamily: sans, fontSize: "0.65rem", letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(249,248,243,0.5)", background: "none", border: `0.5px solid rgba(249,248,243,0.2)`, padding: "0.45rem 1rem" }}>Close ×</button>
      </div>
      {/* PDF viewer */}
      <iframe src={book.pdf} style={{ flex: 1, border: "none", background: "#fff" }} title={book.title} />
    </div>
  );
}

}

function ContactForm() {
  const [fields, setFields] = useState({ name: "", email: "", message: "" });
  const [status, setStatus] = useState("idle");
  const set = key => e => setFields(f => ({ ...f, [key]: e.target.value }));
  const handleSubmit = async () => {
    if (!fields.name.trim() || !fields.email.trim() || !fields.message.trim()) return;
    setStatus("sending");
    try {
      const res = await fetch("https://formspree.io/f/YOUR_FORM_ID", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(fields),
      });
      setStatus(res.ok ? "sent" : "error");
      if (res.ok) setFields({ name: "", email: "", message: "" });
    } catch { setStatus("error"); }
  };
  const inp = { ...inpBase, fontFamily: serif };
  if (status === "sent") return <p style={{ fontFamily: serif, fontSize: "1.1rem", color: C.ink, opacity: 0.55, fontStyle: "italic" }}>Thank you — I'll be in touch.</p>;
  return (
    <div style={{ maxWidth: "480px" }}>
      <input value={fields.name}    onChange={set("name")}    placeholder="Your name"    style={inp} />
      <input value={fields.email}   onChange={set("email")}   placeholder="Your email"   type="email" style={inp} />
      <textarea value={fields.message} onChange={set("message")} placeholder="Your message" rows={5} style={{ ...inp, resize: "none", lineHeight: 1.7 }} />
      {status === "error" && <p style={{ fontFamily: sans, fontSize: "0.68rem", color: C.poemAccent, marginBottom: "1rem" }}>Something went wrong — please try again.</p>}
      <button onClick={handleSubmit} disabled={status === "sending" || !fields.name.trim() || !fields.email.trim() || !fields.message.trim()}
        style={{ fontFamily: sans, fontSize: "0.68rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.bg, background: C.ink, border: "none", padding: "0.65rem 1.75rem", opacity: (!fields.name.trim() || !fields.email.trim() || !fields.message.trim()) ? 0.4 : 1 }}>
        {status === "sending" ? "Sending…" : "Send"}
      </button>
    </div>
  );
}

// ── Admin: book form ───────────────────────────────────────────────────────
function BookForm({ initial, onSave, onCancel }) {
  const blank = { title: "", publisher: "", date: "", description: "", link: "", image: null, pdf: null, pdfFile: null };
  const [form, setForm] = useState(initial ? { ...initial } : blank);
  const [preview, setPreview] = useState(initial?.image || null);
  const [pdfName, setPdfName] = useState(initial?.pdf ? "PDF uploaded" : null);
  const [saving, setSaving] = useState(false);
  const [uploadProgress, setUploadProgress] = useState(null);
  const fileRef = useRef();
  const pdfRef  = useRef();
  const set = key => e => setForm(f => ({ ...f, [key]: e.target.value }));
  const handleImage = async e => {
    const file = e.target.files[0]; if (!file) return;
    const data = await compress(file); setPreview(data); setForm(f => ({ ...f, image: data }));
  };
  const handlePdf = e => {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 20 * 1024 * 1024) { alert("PDF is too large (max 20 MB)."); return; }
    // Store the raw File object — we'll upload to Storage on save
    setForm(f => ({ ...f, pdfFile: file, pdf: form.pdf || null }));
    setPdfName(file.name);
  };
  const handleSave = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    try {
      let finalForm = { ...form };
      // If there's a new PDF file, upload it to Firebase Storage first
      if (form.pdfFile && window._fb?.uploadPdf) {
        setUploadProgress("Uploading PDF…");
        const bookId = Date.now().toString();
        const pdfUrl = await window._fb.uploadPdf(form.pdfFile, bookId);
        finalForm = { ...finalForm, pdf: pdfUrl, pdfFile: null };
        setUploadProgress(null);
      } else {
        finalForm = { ...finalForm, pdfFile: null };
      }
      await onSave(finalForm);
    } catch (err) {
      console.error("Save failed:", err);
      alert("Save failed: " + (err.message || err));
    }
    setSaving(false);
  };
  return (
    <div style={{ maxWidth: "580px" }}>
      <Lbl>Title</Lbl>
      <input value={form.title} onChange={set("title")} placeholder="Book title" style={inpBase} />
      <Lbl>Publisher</Lbl>
      <input value={form.publisher} onChange={set("publisher")} placeholder="Publisher name" style={inpBase} />
      <Lbl>Publication date</Lbl>
      <input value={form.date} onChange={set("date")} placeholder="e.g. 2023" style={inpBase} />
      <Lbl>Description</Lbl>
      <textarea value={form.description} onChange={set("description")} placeholder="A short description…" rows={4} style={{ ...inpBase, resize: "none", fontFamily: serif, fontStyle: "italic", lineHeight: 1.7 }} />
      <Lbl>Order link (optional)</Lbl>
      <input value={form.link} onChange={set("link")} placeholder="https://…" style={inpBase} />
      <Lbl>Cover image (optional)</Lbl>
      <div onClick={() => fileRef.current.click()} style={{ border: `0.5px solid ${C.border}`, borderRadius: "2px", padding: "1.5rem", cursor: "pointer", marginBottom: preview ? "1rem" : "2rem", textAlign: "center" }}>
        {preview ? <img src={preview} alt="" style={{ maxHeight: "200px", maxWidth: "100%", objectFit: "contain", display: "block", margin: "0 auto" }} />
          : <p style={{ fontFamily: sans, fontSize: "0.7rem", color: C.muted, letterSpacing: "0.1em" }}>Click to upload cover</p>}
      </div>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{ display: "none" }} />
      {preview && <button onClick={() => { setPreview(null); setForm(f => ({ ...f, image: null })); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.muted, background: "none", border: "none", padding: 0, marginBottom: "2rem", display: "block" }}>Remove image ×</button>}
      <Lbl>PDF (optional — max 8 MB)</Lbl>
      <div onClick={() => pdfRef.current.click()} style={{ border: `0.5px solid ${C.border}`, borderRadius: "2px", padding: "1.25rem 1.5rem", cursor: "pointer", marginBottom: pdfName ? "1rem" : "2rem", display: "flex", alignItems: "center", gap: "1rem" }}>
        <span style={{ fontFamily: sans, fontSize: "0.7rem", color: pdfName ? C.ink : C.muted, letterSpacing: "0.1em" }}>{pdfName || "Click to upload PDF"}</span>
        {pdfName && <span style={{ fontFamily: sans, fontSize: "0.6rem", color: C.essayAccent, letterSpacing: "0.1em" }}>✓</span>}
      </div>
      <input ref={pdfRef} type="file" accept="application/pdf" onChange={handlePdf} style={{ display: "none" }} />
      {pdfName && <button onClick={() => { setForm(f => ({ ...f, pdf: null })); setPdfName(null); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.muted, background: "none", border: "none", padding: 0, marginBottom: "2rem", display: "block" }}>Remove PDF ×</button>}
      <div style={{ display: "flex", gap: "1rem", paddingTop: "1.25rem", borderTop: `0.5px solid ${C.border}` }}>
        <button onClick={handleSave} disabled={saving || !form.title.trim()} style={{ fontFamily: sans, fontSize: "0.68rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.bg, background: C.ink, border: "none", padding: "0.65rem 1.75rem", opacity: !form.title.trim() ? 0.4 : 1 }}>{uploadProgress || (saving ? "Saving…" : "Save book")}</button>
        <button onClick={onCancel} style={{ fontFamily: sans, fontSize: "0.68rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.ink, background: "none", border: `0.5px solid ${C.border}`, padding: "0.65rem 1.5rem" }}>Cancel</button>
      </div>
    </div>
  );
}

            <div key={post.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1.2rem 0", borderBottom: `0.5px solid ${C.border}`, gap: "2rem" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "1.25rem", flex: 1, minWidth: 0 }}>
                <span style={{ fontFamily: serif, fontSize: "1.2rem", color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{post.title}</span>
                <Badge type={post.type} />
                {post.image && <span style={{ fontFamily: sans, fontSize: "0.58rem", letterSpacing: "0.12em", color: C.muted }}>img</span>}
              </div>
              <div style={{ display: "flex", gap: "1.5rem", flexShrink: 0, alignItems: "center" }}>
                <Muted>{post.date}</Muted>
                <button onClick={() => startEdit(post)} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.ink, opacity: 0.4, background: "none", border: "none", padding: 0 }}>Edit</button>
                <button onClick={() => { if (confirm("Delete this post?")) onDeletePost(post.id); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.poemAccent, opacity: 0.55, background: "none", border: "none", padding: 0 }}>Delete</button>
              </div>
            </div>
          ))
      )}

      {/* Books list */}
      {tab === "books" && (
        books.length === 0
          ? <p style={{ fontFamily: serif, fontSize: "1.1rem", color: C.ink, opacity: 0.35, fontStyle: "italic" }}>No books yet.</p>
          : books.map(book => (
            <div key={book.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1.2rem 0", borderBottom: `0.5px solid ${C.border}`, gap: "2rem" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "1.25rem", flex: 1, minWidth: 0 }}>
                <span style={{ fontFamily: serif, fontSize: "1.2rem", color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{book.title}</span>
                {book.image && <span style={{ fontFamily: sans, fontSize: "0.58rem", letterSpacing: "0.12em", color: C.muted }}>img</span>}
              </div>
              <div style={{ display: "flex", gap: "1.5rem", flexShrink: 0, alignItems: "center" }}>
                <Muted>{book.date}</Muted>
                <button onClick={() => startEdit(book)} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.ink, opacity: 0.4, background: "none", border: "none", padding: 0 }}>Edit</button>
                <button onClick={() => { if (confirm("Delete this book?")) onDeleteBook(book.id); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.poemAccent, opacity: 0.55, background: "none", border: "none", padding: 0 }}>Delete</button>
              </div>
            </div>
          ))
      )}

      {/* About editor */}
      {tab === "about" && <AboutForm about={about} onSave={onSaveAbout} />}
    </div>
  );
}

// ── Firebase helpers ───────────────────────────────────────────────────────
function fb() { return window._fb; }
function fbReady() { return !!window._fb; }

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [posts, setPosts]   = useState([]);
  const [books, setBooks]   = useState([]);
  const [about, setAbout]   = useState(DEFAULT_ABOUT);
  const [view, setView]     = useState("home");
  const [post, setPost]     = useState(null);
  const [adminAuth, setAdminAuth] = useState(false);
  const [ready, setReady]   = useState(false);

  // Wait for Firebase then subscribe to real-time data
  useEffect(() => {
    let tries = 0;
    const iv = setInterval(() => {
      if (fbReady()) {
        clearInterval(iv);
        console.log("Firebase ready!");
        setReady(true);
      } else if (++tries > 100) {
        clearInterval(iv);
        console.warn("Firebase not available, falling back to localStorage");
        const p = loadKey(POSTS_KEY); setPosts(p && p.length > 0 ? p : SEED_POSTS);
        const b = loadKey(BOOKS_KEY); if (b) setBooks(b);
        const a = loadKey(ABOUT_KEY); if (a) setAbout(a);
        setReady(true);
      }
    }, 100);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!ready || !fbReady()) return;
    const unsubP = fb().onPosts(data => {
      if (data.length === 0) {
        SEED_POSTS.forEach(p => fb().savePost(p.id, { ...p, createdAt: Date.now() }));
      } else { setPosts(data); }
    });
    const unsubB = fb().onBooks(data => setBooks(data));
    const unsubA = fb().onAbout(data => setAbout(data));
    return () => { unsubP(); unsubB(); unsubA(); };
  }, [ready]);

  // Mudcloth background pattern
  useEffect(() => {
    const encoded = encodeURIComponent(MUDCLOTH_SVG);
    const style = document.createElement("style");
    style.textContent = `
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,${encoded}");
        background-repeat: repeat;
        background-size: 60px 60px;
        opacity: 0.032;
        pointer-events: none;
        z-index: 0;
      }
      #root { position: relative; z-index: 1; }
    `;
    document.head.appendChild(style);
    return () => document.head.removeChild(style);
  }, []);

  const handleSavePost = async (form, editId) => {
    const id = editId || `p-${Date.now()}`;
    const createdAt = editId ? (posts.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now();
    if (fbReady()) await fb().savePost(id, { ...form, id, createdAt });
    else { const u = editId ? posts.map(p=>p.id===editId?{...form,id}:p) : [{...form,id},...posts]; setPosts(u); saveKey(POSTS_KEY,u); }
  };
  const handleDeletePost = async id => {
    if (fbReady()) await fb().deletePost(id);
    else { const u = posts.filter(p=>p.id!==id); setPosts(u); saveKey(POSTS_KEY,u); }
  };
  const handleSaveBook = async (form, editId) => {
    const id = editId || `b-${Date.now()}`;
    if (fbReady()) await fb().saveBook(id, { ...form, id });
    else { const u = editId ? books.map(b=>b.id===editId?{...form,id}:b) : [...books,{...form,id}]; setBooks(u); saveKey(BOOKS_KEY,u); }
  };
  const handleDeleteBook = async id => {
    if (fbReady()) await fb().deleteBook(id);
    else { const u = books.filter(b=>b.id!==id); setBooks(u); saveKey(BOOKS_KEY,u); }
  };
  const handleSaveAbout = async a => {
    if (fbReady()) await fb().saveAbout(a);
    else { setAbout(a); saveKey(ABOUT_KEY,a); }
  };

  const handleExport = () => exportData(posts, books, about);
  const handleImport = file => {
    importData(file, async (p, b, a) => {
      if (fbReady()) {
        await Promise.all(p.map(x => fb().savePost(x.id, x)));
        await Promise.all(b.map(x => fb().saveBook(x.id, x)));
        await fb().saveAbout(a);
      } else {
        setPosts(p); setBooks(b); setAbout(a);
        saveKey(POSTS_KEY,p); saveKey(BOOKS_KEY,b); saveKey(ABOUT_KEY,a);
      }
      alert("Import successful!");
    });
  };

  const openPost = p => { setPost(p); setView("post"); };
  const nav = v => { setView(v); if (v !== "post") setPost(null); };
  const isAdmin = view === "admin";

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink }}>
      {!isAdmin && <Nav view={view} setView={nav} />}
      {!isAdmin && <MudclothBand />}
      {isAdmin && !adminAuth && <AdminLogin onAuth={() => setAdminAuth(true)} onBack={() => nav("home")} />}
      {isAdmin &&  adminAuth && <AdminPanel posts={posts} books={books} about={about} onSavePost={handleSavePost} onDeletePost={handleDeletePost} onSaveBook={handleSaveBook} onDeleteBook={handleDeleteBook} onSaveAbout={handleSaveAbout} onExport={handleExport} onImport={handleImport} onBack={() => nav("home")} />}
      {!isAdmin && view === "home"    && <Home posts={posts} openPost={openPost} setView={nav} />}
      {!isAdmin && view === "archive" && <Archive posts={posts} openPost={openPost} />}
      {!isAdmin && view === "post"    && <PostView post={post} setView={nav} />}
      {!isAdmin && view === "about"   && <About books={books} about={about} />}
      {!isAdmin && <MudclothBand />}
      {!isAdmin && <Footer setView={nav} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
