// ── Storage ────────────────────────────────────────────────────────────────
function loadKey(key) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveKey(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function fb() { return window._fb; }
function fbReady() { return !!window._fb; }

// ── Export / Import ────────────────────────────────────────────────────────
function exportData(posts, books, about) {
  const data = { version: 1, exportedAt: new Date().toISOString(), posts, books, about };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ngoni-site-backup.json"; a.click();
  URL.revokeObjectURL(url);
}

function importData(file, onDone) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.posts || !data.books) { alert("Invalid backup file."); return; }
      onDone(data.posts, data.books, data.about || DEFAULT_ABOUT);
    } catch { alert("Could not read file — make sure it's a valid backup."); }
  };
  reader.readAsText(file);
}

// ── Image compression ──────────────────────────────────────────────────────
async function compress(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = 1000;
        const r = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * r); c.height = Math.round(img.height * r);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL("image/jpeg", 0.76));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Shared UI ──────────────────────────────────────────────────────────────
function Badge({ type }) {
  const color = type === "poem" ? C.poemAccent : C.essayAccent;

}
function Muted({ children, style = {} }) {
  return <span style={{ fontFamily: sans, fontSize: "0.72rem", color: C.muted, ...style }}>{children}</span>;
}
function Lbl({ children }) {
  return <label style={{ fontFamily: sans, fontSize: "0.6rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.muted, display: "block", marginBottom: "0.5rem" }}>{children}</label>;
}
function Inp({ value, onChange, placeholder, style = {} }) {
  return <input value={value} onChange={onChange} placeholder={placeholder} style={{ width: "100%", background: "transparent", border: "none", borderBottom: `0.5px solid ${C.border}`, padding: "0.5rem 0", fontFamily: serif, fontSize: "1.1rem", color: C.ink, outline: "none", ...style }} />;
}
function Txa({ value, onChange, placeholder, rows = 8 }) {
  return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{ width: "100%", background: "transparent", border: `0.5px solid ${C.border}`, padding: "0.75rem", fontFamily: serif, fontSize: "1rem", color: C.ink, outline: "none", resize: "vertical", lineHeight: 1.7 }} />;
}
function Btn({ onClick, children, subtle = false, danger = false, style = {} }) {
  const color = danger ? C.poemAccent : C.ink;
  return (
    <button onClick={onClick} style={{ fontFamily: sans, fontSize: "0.62rem", letterSpacing: "0.2em", textTransform: "uppercase", color, opacity: subtle ? 0.4 : 0.85, background: "none", border: subtle ? "none" : `0.5px solid ${color}`, padding: subtle ? "0" : "0.55rem 1.4rem", ...style }}>
      {children}
    </button>
  );
}

// ── PostForm ───────────────────────────────────────────────────────────────
function PostForm({ initial, onSave, onCancel }) {
  const [form, setForm] = useState(initial || { type: "poem", title: "", date: "", excerpt: "", content: "", image: null });
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const handleImage = async e => {
    const file = e.target.files[0];
    if (file) { const img = await compress(file); setForm(f => ({ ...f, image: img })); }
  };
  return (
    <div style={{ display: "grid", gap: "1.75rem" }}>
      <div>
        <Lbl>Type</Lbl>
        <div style={{ display: "flex", gap: "1.5rem" }}>
          {["poem", "essay"].map(t => (
            <label key={t} style={{ fontFamily: sans, fontSize: "0.68rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.ink, opacity: form.type === t ? 1 : 0.35, cursor: "pointer", display: "flex", alignItems: "center", gap: "0.5rem" }}>
              <input type="radio" name="type" value={t} checked={form.type === t} onChange={set("type")} style={{ accentColor: C.ink }} /> {t}
            </label>
          ))}
        </div>
      </div>
      <div><Lbl>Title</Lbl><Inp value={form.title} onChange={set("title")} placeholder="Title" /></div>
      <div><Lbl>Date</Lbl><Inp value={form.date} onChange={set("date")} placeholder="e.g. April 2025" /></div>
      <div><Lbl>Excerpt</Lbl><Txa value={form.excerpt} onChange={set("excerpt")} placeholder="Opening line or short excerpt shown on cards…" rows={3} /></div>
      <div><Lbl>Content</Lbl><Txa value={form.content} onChange={set("content")} placeholder="Full text…" rows={14} /></div>
      <div>
        <Lbl>Image (optional)</Lbl>
        <input type="file" accept="image/*" onChange={handleImage} style={{ fontFamily: sans, fontSize: "0.7rem", color: C.muted }} />
        {form.image && <img src={form.image} alt="" style={{ marginTop: "0.75rem", maxHeight: "140px", display: "block" }} />}
        {form.image && <button onClick={() => setForm(f => ({ ...f, image: null }))} style={{ fontFamily: sans, fontSize: "0.58rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.poemAccent, background: "none", border: "none", marginTop: "0.4rem" }}>Remove image</button>}
      </div>
      <div style={{ display: "flex", gap: "1.25rem", paddingTop: "0.5rem" }}>
        <Btn onClick={() => { if (form.title && form.content) onSave(form); else alert("Title and content are required."); }}>Save</Btn>
        <Btn onClick={onCancel} subtle>Cancel</Btn>
      </div>
    </div>
  );
}

  return (
    <div style={{ maxWidth: "380px", margin: "8rem auto", padding: "0 2rem" }}>
      <button onClick={onBack} style={{ fontFamily: sans, fontSize: "0.6rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.muted, background: "none", border: "none", marginBottom: "2.5rem", display: "block" }}>← Back</button>
      <h2 style={{ fontFamily: serif, fontSize: "1.6rem", fontWeight: 300, color: C.ink, marginBottom: "2rem" }}>Admin</h2>
      <Lbl>Password</Lbl>
      <input type="password" value={pass} onChange={e => { setPass(e.target.value); setErr(false); }}
        onKeyDown={e => e.key === "Enter" && attempt()}
        style={{ width: "100%", background: "transparent", border: "none", borderBottom: `0.5px solid ${err ? C.poemAccent : C.border}`, padding: "0.5rem 0", fontFamily: serif, fontSize: "1.1rem", color: C.ink, outline: "none", marginBottom: "1.5rem" }} />
      {err && <p style={{ fontFamily: sans, fontSize: "0.68rem", color: C.poemAccent, marginBottom: "1rem" }}>Incorrect password.</p>}
      <Btn onClick={attempt}>Enter</Btn>
    </div>
  );
}

// ── AdminPanel ─────────────────────────────────────────────────────────────
function AdminPanel({ posts, books, about, onSavePost, onDeletePost, onSaveBook, onDeleteBook, onSaveAbout, onExport, onImport, onBack }) {
  const [tab, setTab]       = useState("posts");
  const [screen, setScreen] = useState("list"); // "list" | "new" | "edit"
  const [editItem, setEditItem] = useState(null);
  const importRef = useRef();

  const startEdit = item => { setEditItem(item); setScreen("edit"); };
  const startNew  = ()   => { setEditItem(null);  setScreen("new");  };

  const handleSavePost = (form) => {
    onSavePost(form, editItem ? editItem.id : null);
    setScreen("list"); setEditItem(null);
  };
  const handleSaveBook = (form) => {
    onSaveBook(form, editItem ? editItem.id : null);
    setScreen("list"); setEditItem(null);
  };

  if (screen === "new" || screen === "edit") {
    return (
      <div style={{ maxWidth: "680px", margin: "0 auto", padding: "3.5rem 2rem" }}>
        <button onClick={() => { setScreen("list"); setEditItem(null); }} style={{ fontFamily: sans, fontSize: "0.6rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.muted, background: "none", border: "none", marginBottom: "2.5rem", display: "block" }}>← Back to list</button>
        <h2 style={{ fontFamily: serif, fontSize: "1.6rem", fontWeight: 300, color: C.ink, marginBottom: "2.5rem" }}>
          {screen === "edit" ? "Edit" : "New"} {tab === "posts" ? "post" : "book"}
        </h2>
        {tab === "posts"
          ? <PostForm initial={editItem} onSave={handleSavePost} onCancel={() => { setScreen("list"); setEditItem(null); }} />
          : <BookForm initial={editItem} onSave={handleSaveBook} onCancel={() => { setScreen("list"); setEditItem(null); }} />
        }
      </div>
    );
  }

  return (
    <div style={{ maxWidth: "720px", margin: "0 auto", padding: "3.5rem 2rem" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "3rem" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: "1.5rem" }}>
          <button onClick={onBack} style={{ fontFamily: sans, fontSize: "0.6rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.muted, background: "none", border: "none" }}>← Back</button>
          <h2 style={{ fontFamily: serif, fontSize: "1.6rem", fontWeight: 300, color: C.ink }}>Admin</h2>
        </div>
        <div style={{ display: "flex", gap: "1.25rem", alignItems: "center" }}>
          {tab !== "about" && (
            <Btn onClick={startNew}>+ New {tab === "posts" ? "post" : "book"}</Btn>
          )}
          <Btn onClick={onExport} subtle>Export backup</Btn>
          <input ref={importRef} type="file" accept=".json" style={{ display: "none" }}
            onChange={e => { if (e.target.files[0]) { onImport(e.target.files[0]); e.target.value = ""; } }} />
          <Btn onClick={() => importRef.current.click()} subtle>Import backup</Btn>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: "2rem", marginBottom: "2.5rem", borderBottom: `0.5px solid ${C.border}`, paddingBottom: "1rem" }}>
        {[["Writing", "posts"], ["Books", "books"], ["About page", "about"]].map(([label, key]) => (
          <button key={key} onClick={() => { setTab(key); setScreen("list"); }} style={{ fontFamily: sans, fontSize: "0.68rem", letterSpacing: "0.2em", textTransform: "uppercase", color: C.ink, opacity: tab === key ? 1 : 0.35, fontWeight: tab === key ? 500 : 400, background: "none", border: "none", padding: "0 0 6px", borderBottom: tab === key ? `1.5px solid ${C.ink}` : "1.5px solid transparent" }}>{label}</button>
        ))}
      </div>

      {/* Posts list */}
      {tab === "posts" && (
        posts.length === 0
          ? <p style={{ fontFamily: serif, fontSize: "1.1rem", color: C.ink, opacity: 0.35, fontStyle: "italic" }}>No posts yet.</p>
          : posts.map(post => (
            <div key={post.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1.2rem 0", borderBottom: `0.5px solid ${C.border}`, gap: "2rem" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "1.25rem", flex: 1, minWidth: 0 }}>
                <span style={{ fontFamily: serif, fontSize: "1.2rem", color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{post.title}</span>
                <Badge type={post.type} />
                {post.image && <span style={{ fontFamily: sans, fontSize: "0.58rem", letterSpacing: "0.12em", color: C.muted }}>img</span>}
              </div>
              <div style={{ display: "flex", gap: "1.5rem", flexShrink: 0, alignItems: "center" }}>
                <Muted>{post.date}</Muted>
                <button onClick={() => startEdit(post)} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.ink, opacity: 0.4, background: "none", border: "none", padding: 0 }}>Edit</button>
                <button onClick={() => { if (confirm("Delete this post?")) onDeletePost(post.id); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.poemAccent, opacity: 0.55, background: "none", border: "none", padding: 0 }}>Delete</button>
              </div>
            </div>
          ))
      )}

      {/* Books list */}
      {tab === "books" && (
        books.length === 0
          ? <p style={{ fontFamily: serif, fontSize: "1.1rem", color: C.ink, opacity: 0.35, fontStyle: "italic" }}>No books yet.</p>
          : books.map(book => (
            <div key={book.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1.2rem 0", borderBottom: `0.5px solid ${C.border}`, gap: "2rem" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "1.25rem", flex: 1, minWidth: 0 }}>
                <span style={{ fontFamily: serif, fontSize: "1.2rem", color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{book.title}</span>
                {book.image && <span style={{ fontFamily: sans, fontSize: "0.58rem", letterSpacing: "0.12em", color: C.muted }}>img</span>}
              </div>
              <div style={{ display: "flex", gap: "1.5rem", flexShrink: 0, alignItems: "center" }}>
                <Muted>{book.date}</Muted>
                <button onClick={() => startEdit(book)} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.ink, opacity: 0.4, background: "none", border: "none", padding: 0 }}>Edit</button>
                <button onClick={() => { if (confirm("Delete this book?")) onDeleteBook(book.id); }} style={{ fontFamily: sans, fontSize: "0.63rem", letterSpacing: "0.15em", textTransform: "uppercase", color: C.poemAccent, opacity: 0.55, background: "none", border: "none", padding: 0 }}>Delete</button>
              </div>
            </div>
          ))
      )}

      {/* About editor */}
      {tab === "about" && <AboutForm about={about} onSave={onSaveAbout} />}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [posts, setPosts]     = useState([]);
  const [books, setBooks]     = useState([]);
  const [about, setAbout]     = useState(DEFAULT_ABOUT);
  const [view, setView]       = useState("home");
  const [post, setPost]       = useState(null);
  const [adminAuth, setAdminAuth] = useState(false);
  const [ready, setReady]     = useState(false);

  // Wait for Firebase module to load then subscribe to real-time data
  useEffect(() => {
    let tries = 0;
    const iv = setInterval(() => {
      if (fbReady()) {
        clearInterval(iv);
        console.log("Firebase ready!");
        setReady(true);
      } else if (++tries > 100) {
        clearInterval(iv);
        console.warn("Firebase not available after 10s, falling back to localStorage");
        const p = loadKey(POSTS_KEY); setPosts(p && p.length > 0 ? p : SEED_POSTS);
        const b = loadKey(BOOKS_KEY); if (b) setBooks(b);
        const a = loadKey(ABOUT_KEY); if (a) setAbout(a);
        setReady(true);
      }
    }, 100);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!ready || !fbReady()) return;
    const unsubP = fb().onPosts(data => {
      if (data.length === 0) {
        SEED_POSTS.forEach(p => fb().savePost(p.id, { ...p, createdAt: Date.now() }));
      } else { setPosts(data); }
    });
    const unsubB = fb().onBooks(data => setBooks(data));
    const unsubA = fb().onAbout(data => setAbout(data));
    return () => { unsubP(); unsubB(); unsubA(); };
  }, [ready]);

  // Mudcloth background pattern
  useEffect(() => {
    const encoded = encodeURIComponent(MUDCLOTH_SVG);
    const style = document.createElement("style");
    style.textContent = `
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,${encoded}");
        background-repeat: repeat;
        background-size: 60px 60px;
        opacity: 0.032;
        pointer-events: none;
        z-index: 0;
      }
      #root { position: relative; z-index: 1; }
    `;
    document.head.appendChild(style);
    return () => document.head.removeChild(style);
  }, []);

  const handleSavePost = async (form, editId) => {
    const id = editId || `p-${Date.now()}`;
    const createdAt = editId ? (posts.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now();
    if (fbReady()) await fb().savePost(id, { ...form, id, createdAt });
    else { const u = editId ? posts.map(p=>p.id===editId?{...form,id}:p) : [{...form,id},...posts]; setPosts(u); saveKey(POSTS_KEY,u); }
  };
  const handleDeletePost = async id => {
    if (fbReady()) await fb().deletePost(id);
    else { const u = posts.filter(p=>p.id!==id); setPosts(u); saveKey(POSTS_KEY,u); }
  };
  const handleSaveBook = async (form, editId) => {
    const id = editId || `b-${Date.now()}`;
    if (fbReady()) await fb().saveBook(id, { ...form, id });
    else { const u = editId ? books.map(b=>b.id===editId?{...form,id}:b) : [...books,{...form,id}]; setBooks(u); saveKey(BOOKS_KEY,u); }
  };
  const handleDeleteBook = async id => {
    if (fbReady()) await fb().deleteBook(id);
    else { const u = books.filter(b=>b.id!==id); setBooks(u); saveKey(BOOKS_KEY,u); }
  };
  const handleSaveAbout = async a => {
    if (fbReady()) await fb().saveAbout(a);
    else { setAbout(a); saveKey(ABOUT_KEY,a); }
  };

  const handleExport = () => exportData(posts, books, about);
  const handleImport = file => {
    importData(file, async (p, b, a) => {
      if (fbReady()) {
        await Promise.all(p.map(x => fb().savePost(x.id, x)));
        await Promise.all(b.map(x => fb().saveBook(x.id, x)));
        await fb().saveAbout(a);
      } else {
        setPosts(p); setBooks(b); setAbout(a);
        saveKey(POSTS_KEY,p); saveKey(BOOKS_KEY,b); saveKey(ABOUT_KEY,a);
      }
      alert("Import successful!");
    });
  };

  const openPost = p => { setPost(p); setView("post"); };
  const nav = v => { setView(v); if (v !== "post") setPost(null); };
  const isAdmin = view === "admin";

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink }}>
      {!isAdmin && <Nav view={view} setView={nav} />}
      {isAdmin && !adminAuth && <AdminLogin onAuth={() => setAdminAuth(true)} onBack={() => nav("home")} />}
      {isAdmin &&  adminAuth && <AdminPanel posts={posts} books={books} about={about} onSavePost={handleSavePost} onDeletePost={handleDeletePost} onSaveBook={handleSaveBook} onDeleteBook={handleDeleteBook} onSaveAbout={handleSaveAbout} onExport={handleExport} onImport={handleImport} onBack={() => nav("home")} />}
      {!isAdmin && view === "home"    && <Home posts={posts} openPost={openPost} setView={nav} />}
      {!isAdmin && view === "archive" && <Archive posts={posts} openPost={openPost} />}
      {!isAdmin && view === "post"    && <PostView post={post} setView={nav} />}
      {!isAdmin && view === "about"   && <About books={books} about={about} />}
      {!isAdmin && <Footer setView={nav} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
